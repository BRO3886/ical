<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">
  <meta name="keywords" content="{{ with .Params.keywords }}{{ delimit . ", " }}{{ else }}{{ delimit .Site.Params.keywords ", " }}{{ end }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">
  {{ with .Site.Params.ogImage }}<meta property="og:image" content="{{ . | absURL }}">{{ end }}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  {{ with .Site.Params.ogImage }}<meta name="twitter:image" content="{{ . | absURL }}">{{ end }}
  {{ with .Site.Params.twitterHandle }}<meta name="twitter:site" content="{{ . }}">{{ end }}

  <!-- Canonical -->
  <link rel="canonical" href="{{ .Permalink }}">

  <!-- Structured Data -->
  {{ if .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "ical",
    "url": "{{ .Site.BaseURL }}",
    "description": "{{ .Site.Params.description }}",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "macOS",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "author": {
      "@type": "Person",
      "name": "{{ .Site.Params.author }}",
      "url": "{{ .Site.Params.github }}"
    },
    "codeRepository": "{{ .Site.Params.github }}",
    "license": "https://opensource.org/licenses/MIT",
    "image": "{{ .Site.Params.ogImage | absURL }}"
  }
  </script>
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ .Site.Title }}",
    "url": "{{ .Site.BaseURL }}",
    "description": "{{ .Site.Params.description }}"
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is ical?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "ical is an open-source command-line interface for macOS Calendar. It lets you create, list, update, delete, search, and export events directly from your terminal — with near-native performance via Apple's EventKit framework."
        }
      },
      {
        "@type": "Question",
        "name": "How do I install ical?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The fastest way is the install script: curl -fsSL https://ical.sidv.dev/install | bash. Alternatively, if you have Go and Xcode CLT installed: go install github.com/BRO3886/ical/cmd/ical@latest"
        }
      },
      {
        "@type": "Question",
        "name": "Why is ical faster than AppleScript?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "ical uses go-eventkit, which bridges directly to Apple's EventKit framework via cgo and Objective-C — the same API Calendar.app uses internally. This gives direct in-process memory access to the calendar store with no IPC overhead. AppleScript sends Apple Events across a process boundary per property per event, making it roughly 3000x slower for large calendars."
        }
      },
      {
        "@type": "Question",
        "name": "Does ical work with iCloud calendars?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. ical accesses everything synced to your local macOS Calendar store — iCloud calendars, local calendars, Exchange, Google, and any other accounts configured in Calendar.app. All commands work across all calendar sources."
        }
      },
      {
        "@type": "Question",
        "name": "What macOS versions are supported?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "ical requires macOS 10.12 (Sierra) or later. On first run, macOS will prompt you to grant Calendar access in System Settings → Privacy & Security → Calendars. It does not work on Linux or Windows."
        }
      },
      {
        "@type": "Question",
        "name": "Can I use ical in scripts and automation?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Every command supports -o json for machine-readable output, making ical easy to pipe into tools like jq. The ical export command produces JSON, CSV, or ICS dumps. The --id flag on show, update, and delete enables safe scripting with stable event IDs."
        }
      },
      {
        "@type": "Question",
        "name": "How do I add ical to an AI coding agent?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Run ical skills install to copy the embedded agent skill to your agent's skill directory. Supports Claude Code (~/.claude/skills/), Codex CLI (~/.agents/skills/), and OpenClaw (~/.openclaw/skills/). The skill teaches the agent all commands, date formats, and output options."
        }
      }
    ]
  }
  </script>
  {{ else }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TechArticle",
    "headline": "{{ .Title }}",
    "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}",
    "url": "{{ .Permalink }}",
    "image": "{{ .Site.Params.ogImage | absURL }}",
    {{ if not .Date.IsZero }}"datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",{{ end }}
    {{ if not .Lastmod.IsZero }}"dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",{{ end }}
    "author": {
      "@type": "Person",
      "name": "{{ .Site.Params.author }}",
      "url": "{{ .Site.Params.github }}"
    },
    "publisher": {
      "@type": "Organization",
      "name": "ical",
      "url": "{{ .Site.BaseURL }}"
    },
    "isPartOf": {
      "@type": "WebSite",
      "name": "{{ .Site.Title }}",
      "url": "{{ .Site.BaseURL }}"
    }
  }
  </script>
  {{ end }}

  <!-- Favicon -->
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">

  {{ hugo.Generator }}
</head>
<body>
  {{ partial "nav.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
